<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Steel - Smart Stridsledning</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <style>
      #steel-slide2-proof {
        position: fixed;
        right: 32px;
        bottom: 86px;
        z-index: 2147483000;
        width: min(390px, calc(100vw - 48px));
        padding: 14px 16px 15px;
        border: 1px solid rgba(92, 167, 255, 0.28);
        border-radius: 14px;
        background:
          linear-gradient(180deg, rgba(12, 22, 36, 0.96), rgba(5, 10, 18, 0.96)),
          rgba(5, 10, 18, 0.96);
        box-shadow: 0 18px 54px rgba(0, 0, 0, 0.46), inset 0 1px 0 rgba(255, 255, 255, 0.06);
        color: #edf5ff;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        pointer-events: none;
      }
      #steel-slide2-proof .proof-built {
        margin-bottom: 10px;
        font-size: 10px;
        font-weight: 900;
        letter-spacing: 0.16em;
        line-height: 1.4;
        text-transform: uppercase;
        color: #7ce0be;
      }
      #steel-slide2-proof pre {
        margin: 0 0 10px;
        padding: 10px 12px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.045);
        color: #dcecff;
        font: 700 12px/1.5 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        white-space: pre-wrap;
      }
      #steel-slide2-proof .proof-copy {
        margin: 0;
        color: rgba(237, 245, 255, 0.82);
        font-size: 12px;
        line-height: 1.55;
      }
      @media (max-width: 900px) {
        #steel-slide2-proof {
          right: 16px;
          bottom: 70px;
          width: min(340px, calc(100vw - 32px));
        }
      }
    </style>
    <script>
      (() => {
        const proofId = 'steel-slide2-proof';
        const slideTitle = 'Attack, interception och supply lines';

        function isVisible(element) {
          const rect = element.getBoundingClientRect();
          const style = window.getComputedStyle(element);
          return rect.width > 0 && rect.height > 0 && style.visibility !== 'hidden' && style.display !== 'none' && Number(style.opacity || '1') > 0;
        }

        function isOperatorSlideVisible() {
          if (!location.pathname.startsWith('/showcase')) return false;
          const candidates = Array.from(document.querySelectorAll('h1,h2,h3,[class*="title"],[class*="slide"]'));
          return candidates.some((node) => node.textContent && node.textContent.includes(slideTitle) && isVisible(node));
        }

        function ensureProofCard() {
          const existing = document.getElementById(proofId);
          if (!isOperatorSlideVisible()) {
            existing?.remove();
            return;
          }
          if (existing) return;

          const card = document.createElement('aside');
          card.id = proofId;
          card.setAttribute('aria-label', 'Steel slide proof');
          card.innerHTML = `
            <div class="proof-built">Byggt i Steel: tactical console · sensor state · intentDistribution</div>
            <pre>intent_distribution = {
  probe,
  feint,
  strike,
  saturation,
  decoy
}</pre>
            <p class="proof-copy">Det här är inte bara animation: hotspår har faktisk intent-modell i Steel-domänen. probe, feint, strike, saturation och decoy finns som strukturerade datapunkter i threat-modellen.</p>
          `;
          document.body.appendChild(card);
        }

        window.addEventListener('DOMContentLoaded', () => {
          ensureProofCard();
          const observer = new MutationObserver(ensureProofCard);
          observer.observe(document.body, { childList: true, subtree: true, characterData: true, attributes: true });
          window.addEventListener('popstate', ensureProofCard);
          setInterval(ensureProofCard, 600);
        });
      })();
    </script>
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
