    <text x="128" y="258" fill="rgba(255,255,255,0.88)" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="22" font-weight="500" letter-spacing="6">SMART STRIDSLEDNING</text>
    <text x="128" y="292" fill="rgba(226,232,240,0.72)" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14" font-weight="500" letter-spacing="2.2">DEPLOYMENT-READY COMMAND SURFACE</text>
