<svg width="1200" height="475" viewBox="0 0 1200 475" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Steel - Smart Stridsledning banner</title>
  <desc id="desc">A dark, minimal banner with steel gradients, angular beams, and a compact command-surface motif.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="475" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#05070a"/>
      <stop offset="0.55" stop-color="#0d1219"/>
      <stop offset="1" stop-color="#121a24"/>
    </linearGradient>
    <linearGradient id="steel" x1="110" y1="110" x2="620" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="0.4" stop-color="#b8c2cc"/>
      <stop offset="1" stop-color="#607080"/>
    </linearGradient>
    <linearGradient id="accent" x1="140" y1="70" x2="1080" y2="350" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.0"/>
      <stop offset="0.45" stop-color="#38bdf8" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#14b8a6" stop-opacity="0.22"/>
    </linearGradient>
    <linearGradient id="panel" x1="86" y1="92" x2="640" y2="372" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b1118" stop-opacity="0.78"/>
      <stop offset="1" stop-color="#05070a" stop-opacity="0.42"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(850 190) rotate(90) scale(180 240)">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.30"/>
      <stop offset="0.7" stop-color="#0ea5e9" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#0f172a" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="475" rx="32" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="1199" height="474" rx="31.5" stroke="rgba(255,255,255,0.06)"/>
  <rect width="1200" height="475" rx="32" fill="url(#grid)" opacity="0.25"/>
  <circle cx="845" cy="184" r="210" fill="url(#glow)"/>

  <path d="M0 348C158 292 286 300 412 334C552 371 712 376 854 309C981 250 1090 235 1200 263V475H0V348Z" fill="#0f172a" fill-opacity="0.58"/>
  <path d="M64 120L390 82" stroke="url(#accent)" stroke-width="2.4" stroke-linecap="round"/>
  <path d="M64 145L390 106" stroke="rgba(255,255,255,0.08)" stroke-width="1.3" stroke-linecap="round"/>
  <path d="M760 80L1088 194" stroke="rgba(255,255,255,0.08)" stroke-width="2" stroke-linecap="round"/>
  <path d="M760 108L1118 236" stroke="url(#accent)" stroke-width="2.2" stroke-linecap="round" opacity="0.55"/>
