    <rect x="744" y="124" width="300" height="180" rx="20" fill="rgba(7,10,14,0.42)" stroke="rgba(255,255,255,0.08)"/>
    <path d="M786 154H954" stroke="rgba(255,255,255,0.08)" stroke-width="1.2"/>
    <path d="M786 218H954" stroke="rgba(255,255,255,0.08)" stroke-width="1.2"/>
    <path d="M786 282H954" stroke="rgba(255,255,255,0.08)" stroke-width="1.2"/>

