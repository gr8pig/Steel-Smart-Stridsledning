      <path d="M108 56L132 70V100L108 114L84 100V70L108 56Z" fill="rgba(56,189,248,0.12)" stroke="rgba(255,255,255,0.28)" stroke-width="1.2"/>
      <circle cx="108" cy="85" r="6" fill="#e2e8f0"/>
      <path d="M108 40V132" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
      <path d="M76 67L140 103" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
      <path d="M76 103L140 67" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    </g>
    <text x="956" y="168" fill="rgba(226,232,240,0.94)" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14" font-weight="600" letter-spacing="2">LIVE DEPLOYMENT</text>
    <text x="956" y="192" fill="rgba(148,163,184,0.82)" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="11" font-weight="500" letter-spacing="1.6">Containerized SSR surface</text>
    <text x="956" y="214" fill="rgba(148,163,184,0.82)" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="11" font-weight="500" letter-spacing="1.6">Cloud Run ready</text>
    <text x="956" y="236" fill="rgba(148,163,184,0.82)" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="11" font-weight="500" letter-spacing="1.6">Single-region Stockholm</text>
