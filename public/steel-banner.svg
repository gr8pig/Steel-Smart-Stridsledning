      <text x="16" y="20" fill="#bae6fd" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="11" font-weight="600" letter-spacing="2">CLOUD RUN</text>
      <rect x="120" width="120" height="30" rx="15" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.10)"/>
      <text x="138" y="20" fill="rgba(226,232,240,0.88)" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="11" font-weight="600" letter-spacing="2">SSR APP</text>
      <rect x="250" width="126" height="30" rx="15" fill="rgba(20,184,166,0.10)" stroke="rgba(20,184,166,0.28)"/>
      <text x="268" y="20" fill="#99f6e4" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="11" font-weight="600" letter-spacing="2">STOCKHOLM</text>
