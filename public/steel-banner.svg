<svg width="1200" height="475" viewBox="0 0 1200 475" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Steel - Smart Stridsledning banner</title>
  <desc id="desc">Minimal high-contrast banner with steel gradients, diagonal beams, and a centered monogram.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="475" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#06070a"/>
      <stop offset="0.55" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#131923"/>
    </linearGradient>
    <linearGradient id="steel" x1="160" y1="92" x2="940" y2="382" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="0.45" stop-color="#9aa7b3"/>
      <stop offset="1" stop-color="#586676"/>
    </linearGradient>
    <linearGradient id="accent" x1="180" y1="0" x2="1020" y2="475" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#60a5fa" stop-opacity="0.0"/>
      <stop offset="0.5" stop-color="#38bdf8" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#14b8a6" stop-opacity="0.25"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(780 188) rotate(90) scale(210 320)">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.28"/>
      <stop offset="0.6" stop-color="#0ea5e9" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#0f172a" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1200" height="475" rx="32" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="1199" height="474" rx="31.5" stroke="rgba(255,255,255,0.06)"/>
  <path d="M0 365C150 306 260 302 410 336C570 373 700 365 848 300C971 246 1080 234 1200 272V475H0V365Z" fill="#0f172a" fill-opacity="0.55"/>
  <path d="M70 102L390 70" stroke="url(#accent)" stroke-width="2" stroke-linecap="round" opacity="0.65"/>
  <path d="M70 126L390 94" stroke="rgba(255,255,255,0.08)" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M770 74L1095 206" stroke="rgba(255,255,255,0.08)" stroke-width="2" stroke-linecap="round"/>
  <path d="M760 104L1102 248" stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
